<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#0b1020" />
<title>DailyDefense — Idle RPG</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Roboto+Mono:wght@500&display=swap" />
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg?v={{VERSION}}" />
<link rel="icon" type="image/png" sizes="32x32" href="/static/icon-32.png?v={{VERSION}}" />
<link rel="apple-touch-icon" sizes="180x180" href="/static/icon-180.png?v={{VERSION}}" />
<link rel="stylesheet" href="/static/style.css?v={{VERSION}}" />
</head>
<body>
<header class="hud">
  <div class="hud-left">
    <strong>DailyDefense</strong>
    <span id="app-version" class="version-chip" title="App version">v?</span>
    <span class="muted">Idle RPG</span>
  </div>
  <div class="hud-stats">
    <span title="Level">Lv <b id="stat-level">1</b></span>
    <span title="Gold">💰 <b id="stat-gold">0</b></span>
  </div>
</header>

<main>
  <section class="combat-card">
    <div class="arena">
      <div class="combatant-figure player-figure" id="player-figure"></div>
      <div class="vs">⚔</div>
      <div class="combatant-figure enemy-figure" id="enemy-figure"></div>
    </div>

    <div class="combatant player">
      <div class="row">
        <strong>You</strong>
        <span class="muted" id="player-stats">⚔ 5 · 🛡 1</span>
      </div>
      <div class="bar">
        <div class="bar-fill bar-hp" id="player-hp-fill"></div>
        <span class="bar-label" id="player-hp-label">50 / 50</span>
      </div>
      <div class="bar bar-thin">
        <div class="bar-fill bar-xp" id="player-xp-fill"></div>
        <span class="bar-label" id="player-xp-label">0 / 100 XP</span>
      </div>
      <div class="rest-banner hidden" id="player-rest">Resting…</div>
    </div>

    <div class="combatant enemy">
      <div class="row">
        <strong id="enemy-name">Slime</strong>
        <span class="muted" id="enemy-stats">⚔ 2 · 🛡 0</span>
      </div>
      <div class="bar">
        <div class="bar-fill bar-enemy" id="enemy-hp-fill"></div>
        <span class="bar-label" id="enemy-hp-label">20 / 20</span>
      </div>
      <div class="reward muted" id="enemy-reward">+10 XP · +3 gold</div>
      <div class="rest-banner hidden" id="enemy-rest">Respawning…</div>
    </div>
  </section>

  <aside class="sidebar">
    <section class="panel">
      <h3>Zones</h3>
      <div id="zone-list" class="zone-list"></div>
    </section>

    <section class="panel">
      <h3>Equipment</h3>
      <div class="equip-list">
        <div class="equip-row">
          <span class="equip-slot">Weapon</span>
          <span class="equip-name" id="equip-weapon-name">—</span>
          <span class="equip-bonus" id="equip-weapon-bonus">+0 ATK</span>
        </div>
        <div class="equip-row">
          <span class="equip-slot">Armor</span>
          <span class="equip-name" id="equip-armor-name">—</span>
          <span class="equip-bonus" id="equip-armor-bonus">+0 DEF</span>
        </div>
      </div>
      <button type="button" id="open-shop" class="shop-btn">Open Shop</button>
    </section>

    <section class="panel">
      <h3>Upgrades</h3>
      <div id="upgrade-list" class="upgrade-list"></div>
    </section>

    <section class="panel">
      <h3>Combat log</h3>
      <ol id="combat-log" class="combat-log"></ol>
    </section>
  </aside>
</main>

<footer class="footer muted">
  <button type="button" id="reset-save" class="link-btn">Reset save</button>
  <span>·</span>
  <a href="/wiki">Wiki</a>
  <span>·</span>
  <a href="/health" target="_blank" rel="noopener">health</a>
</footer>

<div class="modal-backdrop hidden" id="shop-backdrop"></div>
<aside class="modal-panel hidden" id="shop-modal" role="dialog" aria-label="Shop">
  <div class="modal-header">
    <h2>Shop</h2>
    <button type="button" class="modal-close" id="shop-close" aria-label="Close">×</button>
  </div>
  <div class="modal-body">
    <section class="shop-section">
      <h3>Weapons</h3>
      <div class="shop-list" id="shop-weapons"></div>
    </section>
    <section class="shop-section">
      <h3>Armor</h3>
      <div class="shop-list" id="shop-armors"></div>
    </section>
  </div>
</aside>

<script src="/static/game.js?v={{VERSION}}" defer></script>
</body>
</html>
